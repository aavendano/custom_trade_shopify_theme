    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.2/dist/cdn.min.js"></script>
    <style>
        .b-has-rounded-corners {
            border-radius: var(--b-box-radius);
        }

        image {
            object-fit: contain;
            max-height: auto;
            max-width: 100%;
        }

        @media screen and (min-width: 769px) {
            .c-columns {
                background-color: aqua;
            }

            .c-column {
                display: flex !important;
                flex-direction: row !important;
                justify-content: end !important;



            }

            .row-to-col-tablet {
                display: flex !important;
                flex-direction: column !important;
                /* align-items: stretch !important; */
                height: 100% !important;
                align-content: stretch !important;
                flex-grow: 1 !important;
                /* flex-wrap: wrap !important; */
            }

            .c-content-flex-tablet {
                display: flex !important;
                flex-direction: column !important;
                height: 100% !important;
                flex-grow: 1 !important;

            }

            .align-items-stretch-tablet {
                align-items: stretch !important;
                height: 100% !important;
            }

            .c-column-reset-tablet {
                display: flex !important;
                flex: 0 0 auto !important;
                flex-direction: column !important;
                justify-content: center !important;
            }
        }
    </style>
</head>

<body>
    <section class="section">

    </section>
    <section class="section">

                                <div class="column is-half-mobile is-full-tablet c-column-reset-tablet">

                                            src="https://placehold.co/450x450/orange/white">
                                    </figure>
                                </div>
                                <!-- MOBILE -->
                                <div class="column is-half-mobile c-content-flex-tablet">


                                    <div class="block">
                                        <p class="title is-capitalized" x-text="product.title"></p>
                                        <p class="subtitle is-uppercase" x-text="product.vendor"></p>
                                    </div>

                                    <div class="block">
                                        <p>$ <span class="subtitle" x-text="product.price"></span> CAD</p>

                                            CAD</p>
                                    </div>

                                    <div class="block">
                                        <button class="button is-primary is-outlined is-fullwidth is-rounded">
                                            Add to cart
                                        </button>

                                    </div>


                                </div>

                        </div>

        </div>
