<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello Bulma!</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.2/dist/cdn.min.js"></script>
</head>

<body>
    <section class="section">
        <div class="container">
            <h1 class="title">
                Hello World
            </h1>
            <p class="subtitle">
                My first website with <strong>Bulma</strong>!
            </p>
        </div>
    </section>
    <section class="section">
        <div class="columns is-multiline">
            <template x-data="{ products }" x-for="product in products">
                <div class="column b-is-2-tablet b-is-4-desktop">
                    <div class="plt-card-image-container">
                        <div class="plt-card-image">
                            <figure class="image">
                                <img class="b-has-rounded-corners" src="https://placehold.co/450x450/orange/white">
                            </figure>
                        </div>
                    </div>
                    <div class="plt-card-content-wrapper">
                        <div class="plt-card-title"></div>
                        <div class="plt-cart-content"></div>
                        <div class="plt-card-footer"></div>
                    </div>
                </div>
            </template>
        </div>


    </section>

    <script src="cards.js"></script>

</body>

</html>
